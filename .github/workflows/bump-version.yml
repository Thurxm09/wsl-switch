name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      changelog_entry:
        description: "Changelog entry for this version (markdown supported)"
        required: true
        type: string

jobs:
  bump:
    name: Bump version and create tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read current version
        id: current
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: echo "${{ steps.new_version.outputs.version }}" > VERSION

      - name: Update CHANGELOG.md
        run: |
          NEW_VERSION="v${{ steps.new_version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          ENTRY="${{ github.event.inputs.changelog_entry }}"
          # Insert new section after the first line that starts with "# " (title)
          awk -v ver="$NEW_VERSION" -v date="$DATE" -v entry="$ENTRY" '
            /^# / && !inserted {
              print
              print ""
              print "## " ver " - " date
              print ""
              print entry
              print ""
              inserted=1
              next
            }
            { print }
          ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md
          git commit -m "chore: bump version to v${{ steps.new_version.outputs.version }}"
          git push

      - name: Create and push tag
        run: |
          git tag "v${{ steps.new_version.outputs.version }}"
          git push origin "v${{ steps.new_version.outputs.version }}"
