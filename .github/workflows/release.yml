name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "WSL2 Profile Switcher ${{ github.ref_name }}" \
            --generate-notes \
            wsl-switch.ps1 \
            data/profiles.json \
            modules/ProfileManager.ps1 \
            modules/Logger.ps1 \
            modules/Monitor.ps1 \
            modules/MonitorTask.ps1 \
            modules/WeeklyReport.ps1
